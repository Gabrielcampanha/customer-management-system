<!DOCTYPE html>
<html>
<head>
    <title>CRUD Clientes</title>

    <style>
        body {
            font-family: Arial;
            background: #f4f6f8;
        }

        .container {
            max-width: 800px;
            margin: 40px auto;
            background: white;
            padding: 20px;
            border-radius: 10px;
        }

        h1 {
            text-align: center;
        }

        label {
            font-weight: bold;
            display: block;
            margin-top: 10px;
        }

        input {
            padding: 8px;
            width: 100%;
            margin-top: 5px;
        }

        button {
            margin-top: 10px;
            padding: 8px 12px;
            cursor: pointer;
            border: none;
            border-radius: 5px;
            background: #3498db;
            color: white;
        }

        button:hover {
            background: #2980b9;
        }

        .delete {
            background: #e74c3c;
        }

        .edit {
            background: #f39c12;
        }

        table {
            width: 100%;
            margin-top: 20px;
            border-collapse: collapse;
        }

        th, td {
            border: 1px solid #ccc;
            padding: 10px;
            text-align: center;
        }

        th {
            background: #eee;
        }

        .row {
            display: flex;
            gap: 10px;
        }

        .row button {
        flex: none;
        }

    </style>
</head>

<body>

<div class="container">

    <h1>Gerenciamento de Clientes - API</h1>

    <h2>Criar Cliente</h2>

    <label>Nome</label>
    <input id="nome">

    <label>Idade</label>
    <input id="idade" type="number">

    <button onclick="criar()">Criar</button>

    <h2>Buscar por intervalo de ID</h2>

    <div class="row">
        <input id="inicio" placeholder="ID inicial">
        <input id="fim" placeholder="ID final">
    </div>

    <button onclick="buscarIntervalo()">Buscar</button>

    <h2>Clientes</h2>

    <div class="row" style="margin-bottom: 10px;">
        <button onclick="listar()">Atualizar Lista</button>
        <button onclick="limpar()" class="delete">
            Resetar base
        </button>

        <!-- IMPORTAR -->
        <input type="file" id="fileInput" accept=".xlsx" style="display:none">
        <button onclick="document.getElementById('fileInput').click()">
            Importar Excel
        </button>

        <!-- EXPORTAR -->
        <button onclick="exportar()">
            Exportar Excel
        </button>
    </div>

    <table>
        <thead>
            <tr>
                <th>ID</th>
                <th>Nome</th>
                <th>Idade</th>
                <th></th>
            </tr>
        </thead>
        <tbody id="tabela"></tbody>
    </table>
</div>

<script src="script.js"></script>
</body>
</html>
